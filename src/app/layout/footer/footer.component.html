<footer class="site-footer">
  <div class="vbl-container">
    <div class="row g-4 site-footer__grid">
      <div class="col-md-4">
        <h3 class="site-footer__title">{{ site.shortName }}</h3>
        <p class="site-footer__tagline text-muted-vbl">{{ site.tagline }}</p>
        <p class="site-footer__subtitle text-muted-vbl">{{ site.subtitle }}</p>
      </div>

      <div class="col-6 col-md-4">
        <h4 class="site-footer__heading">Quick Links</h4>
        <ul class="site-footer__links">
          @for (link of quickLinks; track link.path) {
            <li>
              <a [routerLink]="link.path">
                <i [class]="link.icon" aria-hidden="true"></i>
                {{ link.label }}
              </a>
            </li>
          }
        </ul>
      </div>

      <div class="col-6 col-md-4">
        <h4 class="site-footer__heading">Connect</h4>
        <ul class="site-footer__links">
          <li>
            <a [href]="site.social.youtube" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-youtube" aria-hidden="true"></i> YouTube
            </a>
          </li>
          <li>
            <a [href]="site.social.instagram" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-instagram" aria-hidden="true"></i> Instagram
            </a>
          </li>
          <li>
            <a [href]="'mailto:' + site.email">{{ site.email }}</a>
          </li>
          <li>
            <a [href]="'tel:' + site.phone">{{ site.phone }}</a>
          </li>
        </ul>
      </div>
    </div>

    <div class="site-footer__bottom">
      <p>&copy; {{ currentYear }} {{ site.brandName }}. All rights reserved.</p>
    </div>
  </div>
</footer>
