@if (embedUrl) {
  <div class="youtube-embed" [class.youtube-embed--short]="isShort">
    <iframe
      [src]="embedUrl"
      [title]="title"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
      loading="eager"
    ></iframe>
  </div>
}
